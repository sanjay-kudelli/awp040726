<!DOCTYPE html>
<html lang="en">
<head>
    <link href="style.css" rel="stylesheet">
    <title>Title</title>
</head>
<body>
    <h2 id="h"><u>Registration Form</u></h2>
    <form id="form">
        <div id="Elements">
            <div>
            <label>Enter your name:</label>
            <input placeholder="LowerCase">
        </div>
        <br>
        <div>
            <label>Enter your DOB:</label>
            <input type="date">
        </div>
        <br>
        <div>
            <label>Enter your email address:</label>
            <input placeholder="example@gmail.com">
        </div>
        <br>
        <div>
            <div>
                <label>Enter the gender:</label>
                <input type="radio" name="1">Male
                <input type="radio" name="1">Female
                <input type="radio" name="1">Others
            </div>
        </div>
        <br>
        <div>
            <label>Enter your password:</label>
            <input type="password">
        </div>
        <br>
        <div>
            <label>Confirm your password:</label>
            <input type="password">
        </div>
        <br>
        
        <div>
            <label>Mode of payment:</label>
            <select>
                <option>Card</option>
                <option>Cash</option>
                <option>UPI</option>
            </select>
        </div>
        <br>
        <input type="submit">
        <input type="reset">
        </div>
    </form>
</body>
</html>
